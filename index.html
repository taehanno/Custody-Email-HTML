<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Template Preview</title>
  <link rel="stylesheet" href="assets/css/preview.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Email Templates</h1>
      <p>Custody · Admin Console</p>
    </div>

    <!-- Custody Front -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Custody Front</div>
      <!-- 이메일 목록은 나중에 추가 -->
      <div id="custody-list">
        <div class="sidebar-item" style="opacity:0.4;cursor:default;">
          <span class="item-icon">📭</span>
          <span>템플릿 준비 중</span>
        </div>
      </div>
    </div>

    <!-- Admin Console -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Admin Console</div>
      <div id="admin-list">
        <div class="sidebar-item" style="opacity:0.4;cursor:default;">
          <span class="item-icon">📭</span>
          <span>템플릿 준비 중</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">이메일 템플릿 선택</span>
      <span class="topbar-path" id="topbar-path"></span>
      <div class="topbar-actions">
        <button class="btn" onclick="openInNewTab()" id="btn-open" style="display:none;">
          ↗ 새 탭에서 열기
        </button>
        <button class="btn" onclick="copyHtml()" id="btn-copy" style="display:none;">
          ⧉ HTML 복사
        </button>
      </div>
    </div>

    <div class="preview-area">
      <div class="iframe-wrap">
        <!-- Toolbar (hidden until template selected) -->
        <div class="iframe-toolbar" id="iframe-toolbar" style="display:none;">
          <span id="toolbar-label">미리보기</span>
          <div class="viewport-btns">
            <button class="vp-btn active" onclick="setViewport('desktop', this)">Desktop</button>
            <button class="vp-btn" onclick="setViewport('mobile', this)">Mobile</button>
          </div>
        </div>

        <div class="iframe-container" id="iframe-container">
          <!-- Welcome state -->
          <div class="welcome-screen" id="welcome-screen">
            <div class="icon">✉️</div>
            <h2>이메일 템플릿 미리보기</h2>
            <p>왼쪽 사이드바에서 템플릿을 선택하세요</p>
          </div>

          <iframe id="preview-frame" style="display:none;" title="Email Preview"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== Template Registry =====
    // 이메일 템플릿 추가 시 여기에 등록
    const TEMPLATES = {
      'custody-front': [
        { id: '01', label: '계정 초대 (임시 비밀번호)',   file: 'templates/custody-front/01-account-invitation.html' },
        { id: '02', label: '출금 서명 요청',              file: 'templates/custody-front/02-withdrawal-sign-request.html' },
        { id: '03', label: '출금 완료',                   file: 'templates/custody-front/03-withdrawal-completed.html' },
        { id: '04', label: '출금 거절',                   file: 'templates/custody-front/04-withdrawal-rejected.html' },
        { id: '05', label: '입금 보류 발생',              file: 'templates/custody-front/05-deposit-hold.html' },
        { id: '06', label: '입금 보류 승인',              file: 'templates/custody-front/06-deposit-hold-approved.html' },
        { id: '07', label: '입금 보류 거절',              file: 'templates/custody-front/07-deposit-hold-rejected.html' },
        { id: '08', label: 'KYB 만료 임박 (D-40)',       file: 'templates/custody-front/08-kyb-expiry-warning.html' },
        { id: '09', label: 'KYB 만료 (출금 차단)',        file: 'templates/custody-front/09-kyb-expired.html' },
        { id: '10', label: 'KYB 갱신 완료 (출금 재개)', file: 'templates/custody-front/10-kyb-renewal-completed.html' },
        { id: '11', label: '계약 만료 전환 (D+30)',      file: 'templates/custody-front/11-contract-expired.html' },
        { id: '12', label: '계정 잠금 (PW/OTP 5회)',     file: 'templates/custody-front/12-account-locked.html' },
        { id: '13', label: 'Master 이메일 변경',          file: 'templates/custody-front/13-master-email-changed.html' },
        { id: '14', label: '서명자 계정 비활성화',        file: 'templates/custody-front/14-signer-deactivated.html' },
        { id: '15', label: '증빙 문서 발송 (성공)',        file: 'templates/custody-front/15-document-issued.html' },
        { id: '16', label: '증빙 문서 발송 실패',          file: 'templates/custody-front/16-document-issue-failed.html' },
        { id: '17', label: '증빙 문서 재발송',             file: 'templates/custody-front/17-document-resent.html' },
      ],
      'admin-console': [
        { id: '01', label: 'Admin 계정 생성 (임시 PW)',          file: 'templates/admin-console/01-admin-account-creation.html' },
        { id: '02', label: 'Admin PW 잠금 해제 (임시 PW)',       file: 'templates/admin-console/02-admin-pw-unlock.html' },
        { id: '03', label: 'Admin OTP 잠금 해제 (재등록 안내)', file: 'templates/admin-console/03-admin-otp-unlock.html' },
        { id: '04', label: 'KYB 결재 요청',                     file: 'templates/admin-console/04-kyb-approval-request.html' },
        { id: '05', label: 'KYB 반려',                          file: 'templates/admin-console/05-kyb-rejected.html' },
        { id: '06', label: 'KYB 만료 임박 (D-40 / D-14 / D-7)', file: 'templates/admin-console/06-kyb-expiry-warning.html' },
        { id: '07', label: 'KYB 만료 (D+0, 출금 차단)',          file: 'templates/admin-console/07-kyb-expired.html' },
        { id: '08', label: '계약 만료 5일 전 경고 (D+25)',       file: 'templates/admin-console/08-contract-expiry-warning.html' },
        { id: '09', label: '계약 만료 전환 (D+30)',              file: 'templates/admin-console/09-contract-expired.html' },
        { id: '10', label: 'Admin 계정 잠금 (PW/OTP 5회)',       file: 'templates/admin-console/10-admin-account-locked.html' },
        { id: '11', label: 'Admin 역할 변경',                    file: 'templates/admin-console/11-admin-role-changed.html' },
        { id: '12', label: '내부요주의인물 결재 요청',            file: 'templates/admin-console/12-internal-watchlist-approval.html' },
        { id: '13', label: 'VASP 연동 오류',                     file: 'templates/admin-console/13-vasp-connection-error.html' },
      ]
    };

    let currentFile = null;

    function renderSidebar() {
      renderSection('custody-list', TEMPLATES['custody-front'], 'custody');
      renderSection('admin-list', TEMPLATES['admin-console'], 'admin');
    }

    function renderSection(containerId, items, type) {
      const container = document.getElementById(containerId);
      if (!items || items.length === 0) return;

      container.innerHTML = items.map(item => `
        <div class="sidebar-item" onclick="loadTemplate('${item.file}', '${item.label}', '${type}')">
          <span class="item-icon">📄</span>
          <span>${item.label}</span>
          <span class="badge ${type}">${type === 'custody' ? 'CF' : 'AC'}</span>
        </div>
      `).join('');
    }

    function loadTemplate(file, label, type) {
      // Active state
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');

      currentFile = file;
      document.getElementById('topbar-title').textContent = label;
      document.getElementById('topbar-path').textContent = file;

      // Show toolbar & buttons
      document.getElementById('iframe-toolbar').style.display = 'flex';
      document.getElementById('btn-open').style.display = 'inline-flex';
      document.getElementById('btn-copy').style.display = 'inline-flex';

      // Hide welcome, show iframe
      document.getElementById('welcome-screen').style.display = 'none';
      const frame = document.getElementById('preview-frame');
      frame.style.display = 'block';
      frame.src = file;

      document.getElementById('toolbar-label').textContent = label;
    }

    function setViewport(size, btn) {
      document.querySelectorAll('.vp-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const frame = document.getElementById('preview-frame');
      if (size === 'mobile') {
        frame.style.maxWidth = '375px';
        frame.style.width = '375px';
      } else {
        frame.style.maxWidth = '680px';
        frame.style.width = '100%';
      }
    }

    function openInNewTab() {
      if (currentFile) window.open(currentFile, '_blank');
    }

    async function copyHtml() {
      if (!currentFile) return;
      try {
        const res = await fetch(currentFile);
        const html = await res.text();
        await navigator.clipboard.writeText(html);

        const btn = document.getElementById('btn-copy');
        const orig = btn.textContent;
        btn.textContent = '✓ 복사됨';
        setTimeout(() => btn.textContent = orig, 2000);
      } catch (e) {
        alert('복사 실패: ' + e.message);
      }
    }

    // Init
    renderSidebar();
  </script>
</body>
</html>
